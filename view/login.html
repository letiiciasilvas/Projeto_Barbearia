<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Barbearia Fio Da Navalha</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilo Principal -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Script de Auth Inicial para evitar flashes de tela se logado -->
    <script src="/js/auth.js"></script>
</head>
<body class="login-body">
    <div class="login-container">
        <!-- Card de Login Glassmorphism -->
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fa-solid fa-scissors"></i>
                </div>
                <h1>Fio Da Navalha</h1>
                <p>Sistema de Gestão & Faturamento</p>
            </div>

            <form id="loginForm" class="login-form">
                <!-- Alertas de Erro -->
                <div id="errorAlert" class="alert alert-danger d-none">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="errorMessage">Erro ao logar.</span>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-with-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" placeholder="admin@fiodanavalha.com.br" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="senha" placeholder="••••••••" required>
                        <i class="fa-regular fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-login" id="btnLogin">
                    <span id="btnText">Entrar</span>
                    <i class="fa-solid fa-arrow-right-to-bracket" id="btnIcon"></i>
                </button>
            </form>

            <div class="login-footer">
                <p>© 2026 Barbearia Fio Da Navalha. Todos os direitos reservados.</p>
            </div>
        </div>
    </div>

    <script>
        // Alternar visibilidade de senha
        const togglePassword = document.querySelector('#togglePassword');
        const senhaInput = document.querySelector('#senha');

        togglePassword.addEventListener('click', function () {
            const type = senhaInput.getAttribute('type') === 'password' ? 'text' : 'password';
            senhaInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Formulário de login
        const loginForm = document.getElementById('loginForm');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        const btnLogin = document.getElementById('btnLogin');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Ocultar erros anteriores
            errorAlert.classList.add('d-none');
            
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            // Validação simples de front-end
            if (!email || !senha) {
                showError('Por favor, preencha todos os campos.');
                return;
            }

            // Exibir loading no botão
            setLoading(true);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message || result.errors.join('<br>'));
                }

                // Salvar dados no localStorage
                localStorage.setItem('fio_navalha_token', result.token);
                localStorage.setItem('fio_navalha_user', JSON.stringify(result.user));

                // Redirecionar para o dashboard
                window.location.href = '/dashboard.html';

            } catch (err) {
                showError(err.message || 'Erro de conexão com o servidor.');
                setLoading(false);
            }
        });

        function showError(msg) {
            errorMessage.innerHTML = msg;
            errorAlert.classList.remove('d-none');
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btnLogin.disabled = true;
                btnText.innerText = 'Autenticando...';
                btnIcon.className = 'fa-solid fa-circle-notch fa-spin';
            } else {
                btnLogin.disabled = false;
                btnText.innerText = 'Entrar';
                btnIcon.className = 'fa-solid fa-arrow-right-to-bracket';
            }
        }
    </script>
</body>
</html>
