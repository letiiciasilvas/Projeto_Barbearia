<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Barbearia Fio Da Navalha</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilo Principal -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Script de Tema e Autenticação -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'light') {
                document.documentElement.classList.add('light-theme');
            }
        })();
    </script>
    <!-- Script de Auth Inicial -->
    <script src="/js/auth.js"></script>
</head>
<body class="login-body">
    <!-- Botão de Alternar Tema -->
    <button class="btn btn-secondary btn-theme-toggle" title="Alternar Tema" style="position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; z-index: 1000; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary);">
        <i class="fa-solid fa-moon theme-toggle-icon"></i>
    </button>

    <div class="login-container">
        <!-- Card de Login & Cadastro Glassmorphism -->
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon" onclick="window.location.href='/'" style="cursor: pointer;" title="Voltar ao início">
                    <i class="fa-solid fa-scissors"></i>
                </div>
                <h1>Fio Da Navalha</h1>
                <p id="cardSubtitle">Agendamento & Gestão de Barbearia</p>
            </div>

            <!-- TABS DE NAVEGAÇÃO -->
            <div class="login-tabs">
                <button class="tab-btn active" id="tabLoginBtn" onclick="toggleAuthTab('login')">Entrar</button>
                <button class="tab-btn" id="tabRegisterBtn" onclick="toggleAuthTab('register')">Cadastrar-se</button>
            </div>

            <!-- ALERTAS -->
            <div id="errorAlert" class="alert alert-danger d-none">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorMessage">Erro ao processar requisição.</span>
            </div>
            <div id="successAlert" class="alert alert-success d-none" style="background-color: var(--success-soft); border: 1px solid rgba(16, 185, 129, 0.3); color: #6ee7b7;">
                <i class="fa-solid fa-circle-check"></i>
                <span id="successMessage">Sucesso!</span>
            </div>

            <!-- GOOGLE LOGIN BUTTON -->
            <button type="button" class="btn btn-secondary btn-block btn-google" id="btnGoogleLogin">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo" width="18" height="18">
                <span>Entrar com o Google</span>
            </button>

            <div class="auth-divider">
                <span>ou use seu e-mail</span>
            </div>

            <!-- FORMULÁRIO 1: LOGIN -->
            <form id="loginForm" class="auth-form-panel">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-with-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" placeholder="Ex: carlos.silva@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="senha" placeholder="••••••••" required>
                        <i class="fa-regular fa-eye toggle-password" id="togglePasswordLogin"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="btnLogin">
                    <span id="btnLoginText">Entrar</span>
                    <i class="fa-solid fa-arrow-right-to-bracket" id="btnLoginIcon"></i>
                </button>
            </form>

            <!-- FORMULÁRIO 2: CADASTRO -->
            <form id="registerForm" class="auth-form-panel d-none">
                <div class="form-group">
                    <label for="regName">Nome Completo</label>
                    <div class="input-with-icon">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="regName" placeholder="Ex: Lucas Pereira">
                    </div>
                </div>

                <div class="form-group">
                    <label for="regEmail">E-mail</label>
                    <div class="input-with-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="Ex: lucas@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label for="regPhone">Telefone / WhatsApp</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-phone"></i>
                        <input type="text" id="regPhone" placeholder="Ex: (11) 97777-6666">
                    </div>
                </div>

                <div class="form-group">
                    <label for="regSenha">Senha</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="regSenha" placeholder="Mínimo 5 caracteres">
                        <i class="fa-regular fa-eye toggle-password" id="togglePasswordRegister"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="btnRegister">
                    <span>Criar Minha Conta</span>
                    <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>

            <div class="login-footer">
                <a href="/" style="color: var(--accent-blue); text-decoration: none; font-size: 0.8rem; display: inline-block; margin-bottom: 10px;"><i class="fa-solid fa-arrow-left"></i> Voltar ao início</a>
                <p>© 2026 Barbearia Fio Da Navalha.</p>
            </div>
        </div>
    </div>

    <!-- MOCK DE GOOGLE AUTH MODAL -->
    <div class="modal-backdrop d-none" id="googleMockModal">
        <div class="modal-card modal-sm text-center" style="padding: 30px 20px; gap: 15px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo" width="48" height="48" style="margin: 0 auto; animation: pulse 1.5s infinite;">
            <h2>Fazendo login com Google</h2>
            <p class="text-muted" style="font-size: 0.85rem;">Conectando com sua Conta do Google...</p>
            <div style="font-size: 1.5rem; color: var(--accent-blue);">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
            </div>
        </div>
    </div>

    <script>
        // Check params if user clicked "Agendar Agora" -> open register tab
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('tab') === 'register') {
            toggleAuthTab('register');
        }

        // Alternar abas de Login e Cadastro
        function toggleAuthTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabLoginBtn = document.getElementById('tabLoginBtn');
            const tabRegisterBtn = document.getElementById('tabRegisterBtn');
            const cardSubtitle = document.getElementById('cardSubtitle');

            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');

            if (tab === 'login') {
                loginForm.classList.remove('d-none');
                registerForm.classList.add('d-none');
                tabLoginBtn.classList.add('active');
                tabRegisterBtn.classList.remove('active');
                cardSubtitle.innerText = 'Agendamento & Gestão de Barbearia';
            } else {
                loginForm.classList.add('d-none');
                registerForm.classList.remove('d-none');
                tabLoginBtn.classList.remove('active');
                tabRegisterBtn.classList.add('active');
                cardSubtitle.innerText = 'Crie sua conta de cliente grátis';
            }
        }

        // Mostrar senhas
        setupPasswordToggle('#togglePasswordLogin', '#senha');
        setupPasswordToggle('#togglePasswordRegister', '#regSenha');

        function setupPasswordToggle(iconSelector, inputSelector) {
            const icon = document.querySelector(iconSelector);
            const input = document.querySelector(inputSelector);
            if (icon && input) {
                icon.addEventListener('click', function () {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                });
            }
        }

        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        const successAlert = document.getElementById('successAlert');
        const successMessage = document.getElementById('successMessage');

        // FORMULÁRIO 1: LOGIN ACTIONS
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.classList.add('d-none');
            
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            setLoginLoading(true);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message || result.errors.join('<br>'));
                }

                // Salvar dados de autenticação
                localStorage.setItem('fio_navalha_token', result.token);
                localStorage.setItem('fio_navalha_user', JSON.stringify(result.user));

                // Roteador dinâmico por Role
                if (result.user.role === 'CLIENTE') {
                    window.location.href = '/client_portal.html';
                } else {
                    window.location.href = '/dashboard.html';
                }

            } catch (err) {
                showError(err.message);
                setLoginLoading(false);
            }
        });

        // FORMULÁRIO 2: CADASTRO ACTIONS
        const registerForm = document.getElementById('registerForm');
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');

            const nome = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const telefone = document.getElementById('regPhone').value.trim();
            const senha = document.getElementById('regSenha').value;

            if (!nome || !email || !telefone || !senha) {
                showError('Por favor, preencha todos os campos do cadastro.');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, telefone, senha })
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message || result.errors.join('<br>'));
                }

                // Salvar dados de autenticação
                localStorage.setItem('fio_navalha_token', result.token);
                localStorage.setItem('fio_navalha_user', JSON.stringify(result.user));

                // Sucesso
                showSuccess('Conta criada! Entrando no portal...');
                setTimeout(() => {
                    window.location.href = '/client_portal.html';
                }, 1200);

            } catch (err) {
                showError(err.message);
            }
        });

        // GOOGLE LOGIN (MOCK COMPACTO)
        document.getElementById('btnGoogleLogin').addEventListener('click', () => {
            errorAlert.classList.add('d-none');
            document.getElementById('googleMockModal').classList.remove('d-none');

            // Simular comunicação com o Google OAuth
            setTimeout(async () => {
                document.getElementById('googleMockModal').classList.add('d-none');
                
                try {
                    // Para o teste do Google, vamos logar com a conta pré-semeada do Carlos Silva (Cliente ID 1)
                    // que possui email carlos.silva@email.com e senha carlos123
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: 'carlos.silva@email.com', senha: 'carlos123' })
                    });
                    
                    const result = await response.json();
                    if (!result.success) throw new Error(result.message);

                    // Alterar nome no front-end para mostrar que foi do Google
                    result.user.nome = result.user.nome + " (Google)";
                    localStorage.setItem('fio_navalha_token', result.token);
                    localStorage.setItem('fio_navalha_user', JSON.stringify(result.user));

                    showSuccess('Login do Google bem-sucedido!');
                    setTimeout(() => {
                        window.location.href = '/client_portal.html';
                    }, 800);

                } catch (e) {
                    showError('Falha na autenticação do Google Mock: ' + e.message);
                }
            }, 1500);
        });

        function showError(msg) {
            errorMessage.innerHTML = msg;
            errorAlert.classList.remove('d-none');
        }

        function showSuccess(msg) {
            successMessage.innerHTML = msg;
            successAlert.classList.remove('d-none');
        }

        function setLoginLoading(isLoading) {
            const btnLogin = document.getElementById('btnLogin');
            const btnText = document.getElementById('btnLoginText');
            const btnIcon = document.getElementById('btnLoginIcon');

            if (isLoading) {
                btnLogin.disabled = true;
                btnText.innerText = 'Autenticando...';
                btnIcon.className = 'fa-solid fa-circle-notch fa-spin';
            } else {
                btnLogin.disabled = false;
                btnText.innerText = 'Entrar';
                btnIcon.className = 'fa-solid fa-arrow-right-to-bracket';
            }
        }
    </script>
</body>
</html>
